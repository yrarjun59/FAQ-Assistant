services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    # healthcheck:
    #   test: ["CMD", "curl", "-f", "http://localhost:11434"]
    #   interval: 10s
    #   timeout: 5s
    #   retries: 5
    #   start_period: 20s

  backend:
    image: yrarjun59/faq-backend:latest    
    container_name: backend_api
    ports:
      - "8000:8000"
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL:-llama3.2:1b}
      - CACHE_DIR=/app/fastembed_cache
    volumes:
      - ./backend/vector_db:/app/vector_db
      - ./backend/fastembed_cache:/app/fastembed_cache
      - ./backend:/app/backend
    depends_on:
      ollama:
        condition:  service_healthy
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

  streamlit:
    image: yrarjun59/faq-frontend:latest 
    container_name: streamlit_ui
    ports:
      - "8501:8501"
    environment:
      - STELLA_API_URL=http://backend:8000
    volummes:
      - ./stream:/app/stream
    
    depends_on:
      backend:
        condition: service_healthy

volumes:
  ollama_data:
  vecotor_db:
  fastembed_cache: