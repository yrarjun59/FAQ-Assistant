services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  backend:
    build: ./app
    container_name: backend_api
    working_dir: /app
    volumes:
      - ./app:/app
      - ./chroma_db:/app/chroma_db
      - ./knowledge/faqs:/app/knowledge
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app

  streamlit:
    build: ./stream
    container_name: streamlit_ui
    working_dir: /app
    volumes:
      - ./stream:/app
    ports:
      - "8501:8501"
    environment:
      - STREAMLIT_ENV=development
      - STELLA_API_URL=http://backend:8000
    depends_on:
      - backend

volumes:
  ollama_data: