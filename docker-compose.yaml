services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 20s

  ollama-init:
    image: ollama/ollama:latest
    container_name: ollama_init
    depends_on:
      ollama:
        condition: service_healthy
    volumes:
      - ollama_data:/root/.ollama
    environment:
      - OLLAMA_HOST=http://ollama:11434
    entrypoint: >
      /bin/sh -c "
        echo 'Pulling models...' &&
        ollama pull ${LLM_MODEL:-llama3.2:1b} &&
        echo 'Models ready'
      "
    restart: "no" 

  backend:
    build: ./backend
    image: yrajun59/faq-backend:latest
    container_name: backend_api
    working_dir: /app
    volumes:
      - vector_db:/app/vector_db
      - fastembed_cache:/root/.cache/fastembed
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL:-llama3.2:1b}
    ports:
      - "8000:8000"
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s

    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app

  streamlit:
    build: ./stream
    image: yrajun59/faq-frontend:latest
    container_name: streamlit_ui
    working_dir: /app
    volumes:
      - ./stream:/app
    ports:
      - "8501:8501"
    environment:
      - STELLA_API_URL=http://backend:8000
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./stream
          target: /app

volumes:
  ollama_data:
  vector_db:
  fastembed_cache: