services:
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1
              capabilities: [gpu]

  backend:
    build: ./backend
    container_name: backend_api
    working_dir: /app
    volumes:
      - vector_db:/app/vector_db
      - fastembed_cache:/root/.cache/fastembed
    environment:
      - OLLAMA_BASE_URL=http://ollama:11434
      - LLM_MODEL=${LLM_MODEL:-llama3.2:1b}
    ports:
      - "8000:8000"
    depends_on:
      - ollama
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/')"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 40s
    develop:
      watch:
        - action: sync
          path: ./backend
          target: /app

  streamlit:
    build: ./stream
    container_name: streamlit_ui
    working_dir: /app
    volumes:
      - ./stream:/app
    ports:
      - "8501:8501"
    environment:
      - STELLA_API_URL=http://backend:8000
    depends_on:
      - backend
    develop:
      watch:
        - action: sync
          path: ./stream
          target: /app

volumes:
  ollama_data:
  vector_db:
  fastembed_cache: