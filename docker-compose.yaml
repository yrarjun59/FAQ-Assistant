services:
  # Service 1: The AI Model (Ollama)
  ollama:
    image: ollama/ollama:latest
    container_name: ollama_server
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    # CRITICAL: Give access to your NVIDIA GPU
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: 1 # for rtx 350
              capabilities: [gpu]

  # Service 2: Your Python Application
  app:
    build: ./app
    container_name: faq-assistant
    working_dir: /app
    ports:
      - "8000:8000"
    command: uvicorn api:app --host 0.0.0.0 --port 8000 --reload
    volumes:
      - ./app:/app
    environment:
      - OLLAMA_BASE_URL=http://ollama_server:11434
      - HF_TOKEN= ${HF_TOKEN}

      - NVIDIA_VISIBLE_DEVICES=all
    depends_on:
      - ollama

    # --- NEWER METHOD: DEVELOP SECTION ---
    develop:
      watch:
        - action: sync
          path: ./app
          target: /app
          ignore:
            - __pycache__
            - venv
        - action: rebuild
          path: ./app/requirements.txt

volumes:
  ollama_data: